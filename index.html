<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airbag — Generador de Presentaciones</title>
<style>
:root{--y:#FFD600;--k:#1A1A1A;--w:#FFF;--g:#F4F4F4;--g2:#888;--g3:#CCC;--gr:#2ECC71;--rd:#E74C3C;--bl:#3498DB;--or:#E67E22;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--g);color:var(--k);min-height:100vh}
.nav{background:var(--k);border-bottom:3px solid var(--y);padding:14px 28px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.nav b{font-size:22px;font-weight:900;color:white;letter-spacing:-.5px}
.nav .dot{width:8px;height:8px;border-radius:50%;background:var(--y)}
.nav span{color:var(--g2);font-size:13px;font-weight:600}
.wrap{max-width:860px;margin:0 auto;padding:24px}
h1{font-size:clamp(24px,4vw,36px);font-weight:900;text-align:center;margin:24px 0 6px}
h1 em{font-style:normal;color:var(--y);background:var(--k);padding:1px 12px;border-radius:6px}
.sub{text-align:center;color:var(--g2);font-size:14px;margin-bottom:28px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px;margin-bottom:40px}
.cd{background:white;border:2px solid #E8E8E8;border-radius:var(--r);cursor:pointer;overflow:hidden;transition:all .15s}
.cd:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.07)}
.cd img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.cd-b{padding:14px}
.cd-t{font-size:14px;font-weight:800;margin-bottom:2px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:.4px}
.cd-d{font-size:11px;color:var(--g2);line-height:1.4;margin-top:5px}
.cd-f{font-size:9px;color:var(--g3);margin-top:6px;font-weight:600}
/* FORM */
.fv{display:none}.fv.on{display:block}
.bk{background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--g2);margin-bottom:14px;padding:0}
.bk:hover{color:var(--k)}
.fh{background:white;border-radius:var(--r);padding:22px;margin-bottom:12px;border:1px solid #E8E8E8;position:relative;overflow:hidden}
.fh .bar{position:absolute;top:0;left:0;right:0;height:4px}
.fh h2{font-size:20px;font-weight:900}
.fh .desc{font-size:12px;color:var(--g2);margin-top:3px}
.fh .st{margin-top:10px;font-size:11px;color:var(--g2);display:flex;gap:16px}
.sp{display:flex;gap:6px;overflow-x:auto;padding:8px 0;margin-bottom:10px}
.sp img{height:110px;border-radius:7px;border:1.5px solid #E8E8E8;flex-shrink:0}
.dlb{background:white;border:1px solid #E8E8E8;border-radius:var(--r);padding:12px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.dlb .i{font-size:11px;color:var(--g2)}.dlb .i b{color:var(--k)}
.dlx{background:var(--k);color:white;border:none;padding:7px 16px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none}
.sec{background:white;border-radius:var(--r);padding:18px 22px;margin-bottom:10px;border:1px solid #E8E8E8}
.sec-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--g2);display:flex;align-items:center;gap:6px;margin-bottom:14px}
.sec-n{width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px 12px}
@media(max-width:600px){.fg{grid-template-columns:1fr}}
.full{grid-column:1/-1}
.fl{font-size:10px;font-weight:700;color:#555;display:block;margin-bottom:3px}
.fl .r{color:var(--rd);margin-left:2px}
.fl .s{font-weight:500;color:#F57F17;font-size:9px;margin-left:3px;cursor:pointer}
.fl .s:hover{text-decoration:underline}
.fi,.fs{width:100%;padding:8px 10px;font-size:12px;border:1.5px solid #DDD;border-radius:7px;background:#FAFAFA;outline:none;font-family:inherit;transition:border-color .12s;box-sizing:border-box}
.fi:focus,.fs:focus{border-color:var(--y);background:white}
.fi::placeholder{color:#BBB}
.fi.has-sug{border-color:#FFE082;background:#FFFEF5}
/* Group add button */
.add-grp{background:none;border:2px dashed var(--g3);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;color:var(--g2);font-size:12px;font-weight:700;margin-bottom:10px;width:100%;transition:all .12s}
.add-grp:hover{border-color:var(--y);color:var(--k)}
/* Actions */
.acts{position:fixed;bottom:0;left:0;right:0;background:white;padding:10px 20px;display:flex;gap:8px;justify-content:center;box-shadow:0 -4px 16px rgba(0,0,0,.05);border-top:1px solid #E8E8E8;z-index:50}
.btn{padding:8px 20px;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;border:none}
.btn-o{background:white;border:2px solid var(--k);color:var(--k)}
.btn-p{background:var(--y);color:var(--k);font-weight:800}
.btn-p:disabled{background:#CCC;cursor:not-allowed}
.res{background:white;border:2px solid var(--y);border-radius:var(--r);padding:18px;margin-top:12px;display:none}
.res.on{display:block}
.res pre{background:#1E1E1E;color:#D4D4D4;padding:12px;border-radius:7px;overflow-x:auto;font-size:11px;line-height:1.5;max-height:320px}
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--k);color:white;padding:8px 22px;border-radius:100px;font-size:12px;font-weight:700;z-index:200;display:none}
</style>
</head>
<body>
<div class="nav"><b>airbag</b><span class="dot"></span><span>Generador de Presentaciones</span></div>

<p class="sub">Elige el escenario, completa los datos de tu cliente y genera el prompt.</p>

</div>

<div class="wrap fv" id="fV">
<button class="bk" onclick="back()">← Volver</button>
<div class="fh" id="fH"></div>
<div class="sp" id="sP"></div>
<div class="dlb" id="dB"></div>
<div id="fBody"></div>
<div class="res" id="resB"><h3 style="font-size:13px;margin-bottom:8px">📋 Prompt generado</h3><pre id="resP"></pre><div style="margin-top:8px"><button class="btn btn-o" onclick="cpRes()">📋 Copiar</button></div></div>
<div style="height:80px"></div>
<div class="acts"><button class="btn btn-o" onclick="cpJSON()">📋 JSON</button><button class="btn btn-p" id="btnG" onclick="gen()">⚡ Generar prompt</button></div>
</div>

let cur=null,D={},groups=[];

// ══════ RENDER CARDS ══════
function renderCards(){
document.getElementById('cds').innerHTML=TPL.map(t=>`
<div class="cd" onclick="sel('${t.id}')">

<p class="cd-d">${t.desc}</p>
<div class="cd-f">📎 ${t.file}</div>
</div></div>`).join('');
}

// Get ref data for a vehicle type
function getRef(tipo){return REF.find(r=>r.v===tipo)||null;}

// ══════ RENDER FORM ══════
function render(){
const t=cur;
// Header
document.getElementById('fH').innerHTML=`<div class="bar" style="background:${t.hex}"></div>
<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
<span style="font-size:24px">${t.icon}</span>
<div><h2>${t.title}</h2><span class="badge" style="background:${t.hex}22;color:${t.hex==='#FFD600'?'#1A1A1A':t.hex}">${t.sub}</span></div></div>
<p class="desc">${t.desc}</p>
<div class="st"><span>Completados: <b id="sF">0</b></span><span>Obligatorios: <b id="sR">0/0</b></span></div>`;

// Slides
document.getElementById('sP').innerHTML=(SL[t.id]||[]).map(s=>`<img src="${s}">`).join('');

// Download bar
document.getElementById('dB').innerHTML=`<div class="i">📎 Plantilla: <b>${t.file}</b></div>
<div style="display:flex;gap:6px"><a href="${t.file}" download class="dlx">⬇ Descargar</a>${t.fileAlt?`<a href="${t.fileAlt}" download class="dlx" style="background:#555">⬇ Alternativa</a>`:''}</div>`;

// Build form body
let html='';
let secIdx=0;

// Fixed sections (before groups)
t.fixed.forEach(sec=>{
  html+=renderSection(sec,secIdx++,t.hex);
});

// Groups
html+=`<div id="groupsArea">`;
groups.forEach((g,gi)=>{
  html+=renderGroup(gi,secIdx+gi,t);
});
html+=`</div>`;
html+=`<button class="add-grp" onclick="addGroup()">
${t.group.addLabel}</button>`;
secIdx+=groups.length;

// After sections
(t.after||[]).forEach(sec=>{
  html+=renderSection(sec,secIdx++,t.hex);
});

document.getElementById('fBody').innerHTML=html;
updStats();
}

function renderSection(sec,idx,hex){
const flds=sec.fields.map(f=>{
  const v=D[f.k]||'';
  const fc=f.full?' full':'';
  if(f.t==='select')return`<div class="${fc}"><label class="fl">${f.l}${f.req?'<span class="r">*</span>':''}</label><select class="fs" onchange="inp('${f.k}',this.value)"><option value="">—</option>${f.opts.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  return`<div class="${fc}"><label class="fl">${f.l}${f.req?'<span class="r">*</span>':''}</label><input class="fi" type="${f.t==='number'?'number':'text'}" placeholder="${f.ph||''}" value="${v}" oninput="inp('${f.k}',this.value)"></div>`;
}).join('');
return`<div class="sec"><div class="sec-t"><span class="sec-n" style="background:${hex};${hex==='#FFD600'?'color:#1A1A1A':''}">${idx+1}</span>${sec.section}</div><div class="fg">${flds}</div></div>`;
}

function renderGroup(gi,secIdx,t){
const g=groups[gi];
const gFields=t.group.fields;
const ref=getRef(g.tipo);

const flds=gFields.map(f=>{
  const gk=`g${gi}_${f.k}`;
  const v=g[f.k]||'';
  const fc=f.full?' full':'';

  // Suggestion from reference data
  let sugHtml='';
  let sugVal='';
  if(f.refKey && ref){
    sugVal=ref[f.refKey];
    sugHtml=`<span class="s" onclick="useSug(${gi},'${f.k}',${sugVal})" title="Usar valor de referencia">💡 $${fmt(sugVal)}</span>`;
  }

  if(f.t==='select' && f.ref){
    return`<div class="${fc}"><label class="fl">${f.l}</label><select class="fs" onchange="grpInp(${gi},'${f.k}',this.value);render()"><option value="">— Seleccionar tipo —</option>${f.opts.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  }
  if(f.t==='select'){
    return`<div class="${fc}"><label class="fl">${f.l}</label><select class="fs" onchange="grpInp(${gi},'${f.k}',this.value)"><option value="">—</option>${f.opts.map(o=>`<option value="${o}" ${v===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
  }

  const hasSug=sugVal && !v;
  return`<div class="${fc}"><label class="fl">${f.l}${sugHtml}</label><input class="fi${hasSug?' has-sug':''}" type="${f.t==='number'?'number':'text'}" placeholder="${sugVal?'ref: $'+fmt(sugVal):(f.ph||'')}" value="${v}" oninput="grpInp(${gi},'${f.k}',this.value)"></div>`;
}).join('');

// Summary line if ref data available
let sumHtml='';
if(ref){
  const n=parseInt(g.unidades)||1;
  sumHtml=`<div style="margin-top:10px;padding:8px 12px;background:#FFFDE7;border-radius:7px;font-size:10px;color:#795548;display:flex;gap:12px;flex-wrap:wrap">
  <span>📊 <b>Ref. ${ref.s}</b></span>
  <span>Comb: <b>$${fmt(ref.comb)}</b>/mes</span>
  <span>Siniestros: <b>$${fmt(ref.sin)}</b>/mes</span>
  <span>Rotación: <b>$${fmt(ref.rot)}</b>/mes</span>
  <span>Total: <b>$${fmt(ref.tot)}</b>/mes</span>
  <span>× ${n} = <b>$${fmt(ref.tot*n)}</b>/mes</span>
  <button class="s" style="border:none;background:var(--y);padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;cursor:pointer" onclick="autoFill(${gi})">Autocompletar ref.</button>
  </div>`;
}

return`<div class="sec" style="border-left:3px solid ${t.hex}">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
<div class="sec-t" style="margin:0"><span class="sec-n" style="background:${t.hex};${t.hex==='#FFD600'?'color:#1A1A1A':''}">${secIdx+1}</span>${t.group.name} ${gi+1}</div>
<button style="background:none;border:none;cursor:pointer;font-size:16px;opacity:.4" onclick="rmGroup(${gi})" title="Eliminar grupo">✕</button>
</div>
<div class="fg">${flds}</div>
${sumHtml}
</div>`;
}

// ══════ ACTIONS ══════
function sel(id){
  cur=TPL.find(t=>t.id===id);D={};groups=[{}];
  document.getElementById('selV').style.display='none';
  document.getElementById('fV').classList.add('on');
  document.getElementById('resB').classList.remove('on');
  render();window.scrollTo(0,0);
}
function back(){
  cur=null;D={};groups=[];
  document.getElementById('selV').style.display='';
  document.getElementById('fV').classList.remove('on');
}
function inp(k,v){D[k]=v;updStats();}
function grpInp(gi,k,v){groups[gi][k]=v;updStats();}
function useSug(gi,k,v){groups[gi][k]=v;render();}
function autoFill(gi){
  const ref=getRef(groups[gi].tipo);
  if(!ref)return;
  const t=cur;
  t.group.fields.forEach(f=>{
    if(f.refKey && ref[f.refKey] && !groups[gi][f.k]){
      groups[gi][f.k]=ref[f.refKey];
    }
  });
  render();
}
function addGroup(){groups.push({});render();}
function rmGroup(gi){if(groups.length>1){groups.splice(gi,1);render();}}

function updStats(){
  if(!cur)return;
  let f=0,rt=0,rf=0;
  cur.fixed.forEach(s=>s.fields.forEach(x=>{
    if(D[x.k]!==undefined&&D[x.k]!=='')f++;
    if(x.req){rt++;if(D[x.k])rf++;}
  }));
  (cur.after||[]).forEach(s=>s.fields.forEach(x=>{
    if(D[x.k]!==undefined&&D[x.k]!=='')f++;
    if(x.req){rt++;if(D[x.k])rf++;}
  }));
  groups.forEach(g=>{Object.values(g).forEach(v=>{if(v!==undefined&&v!=='')f++;});});
  const a=document.getElementById('sF'),b=document.getElementById('sR');
  if(a)a.textContent=f;
  if(b){b.textContent=rf+'/'+rt;b.style.color=rf===rt?'var(--gr)':'var(--rd)';}
  document.getElementById('btnG').disabled=rf<rt;
}

function toast(m){const t=document.getElementById('tst');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2000);}
function cpJSON(){navigator.clipboard.writeText(JSON.stringify({template:cur.id,file:cur.file,data:D,groups},null,2));toast('✓ JSON copiado');}

function gen(){
  const t=cur;
  let p=`Genera la presentación PPTX "${t.title}" (${t.sub}) para Airbag.\n`;
  p+=`📎 PLANTILLA: ${t.file}\n\n`;

  t.fixed.forEach(s=>{
    const ff=s.fields.filter(f=>D[f.k]);
    if(ff.length){p+=`## ${s.section}\n`;ff.forEach(f=>p+=`- ${f.l}: ${D[f.k]}\n`);p+='\n';}
  });

  groups.forEach((g,i)=>{
    const vals=Object.entries(g).filter(([k,v])=>v!==undefined&&v!=='');
    if(vals.length){
      p+=`## ${t.group.name} ${i+1}\n`;
      vals.forEach(([k,v])=>{
        const fld=t.group.fields.find(f=>f.k===k);
        p+=`- ${fld?fld.l:k}: ${v}\n`;
      });
      const ref=getRef(g.tipo);
      if(ref){
        const n=parseInt(g.unidades)||1;
        p+=`- [Ref industria] Costo total mensual estimado: $${fmt(ref.tot*n)} (${n} unidades × $${fmt(ref.tot)}/mes)\n`;
      }
      p+='\n';
    }
  });

  (t.after||[]).forEach(s=>{
    const ff=s.fields.filter(f=>D[f.k]);
    if(ff.length){p+=`## ${s.section}\n`;ff.forEach(f=>p+=`- ${f.l}: ${D[f.k]}\n`);p+='\n';}
  });

  p+=`## Costos de referencia por industria (MXN/mes por vehículo+conductor)\n`;
  p+=`| Sector | Vehículo | Combustible | Mant. | Siniestros | Rotación | Total |\n|---|---|---|---|---|---|---|\n`;
  REF.forEach(r=>p+=`| ${r.s} | ${r.v} | $${fmt(r.comb)} | $${fmt(r.mant)} | $${fmt(r.sin)} | $${fmt(r.rot)} | $${fmt(r.tot)} |\n`);
  p+=`\n## Benchmarks Airbag (casos de éxito)\n- Reducción max rotación: 72%\n- Ahorro max combustible: 9.5%\n- Reducción max siniestros: 51%\n`;
  p+=`\nGenera el .pptx siguiendo el diseño de "${t.file}". Colores: amarillo #FFD600, negro #1A1A1A. Usa las ilustraciones corporativas Airbag. Reemplaza placeholders con datos reales. Datos faltantes → usa referencias de la industria.`;

  document.getElementById('resP').textContent=p;
  document.getElementById('resB').classList.add('on');
  document.getElementById('resB').scrollIntoView({behavior:'smooth'});
}
function cpRes(){navigator.clipboard.writeText(document.getElementById('resP').textContent);toast('✓ Prompt copiado');}

renderCards();
</script>
